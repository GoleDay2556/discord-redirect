<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Automatic browser redirect after 5 seconds -->
    <meta http-equiv="refresh" content="5; url=https://discord.gg">
    <title>Lancasters SMP | Redirecting</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Using your repository background image */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('background.png');
            background-size: cover;
            background-position: center;
            color: #ffffff;
            overflow: hidden;
        }

        .discord-card {
            background: #313338; /* Discord's dark background color */
            padding: 32px;
            border-radius: 8px;
            width: 480px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }

        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 20px;
            object-fit: cover;
            /* Looks for logo.png in your repo */
            background-color: #5865F2; 
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #f2f3f5;
        }

        .subtitle {
            color: #b5bac1;
            font-size: 16px;
            margin-bottom: 24px;
        }

        .timer-container {
            background: #2b2d31;
            padding: 16px;
            border-radius: 4px;
            margin-bottom: 24px;
            border: 1px solid #1e1f22;
        }

        .timer-text {
            font-size: 14px;
            color: #dbdee1;
        }

        #countdown {
            font-weight: bold;
            color: #5865F2; /* Discord Blurple */
        }

        .btn {
            background-color: #5865F2; /* Discord Blurple */
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 3px;
            width: 100%;
            text-decoration: none;
            display: block;
            font-size: 16px;
            font-weight: 500;
            transition: background-color 0.17s ease;
        }

        .btn:hover {
            background-color: #4752c4;
        }

        .footer {
            margin-top: 16px;
            font-size: 12px;
            color: #949ba4;
        }
    </style>
</head>
<body>

    <div class="discord-card">
        <!-- Make sure logo.png is in your GitHub repo! -->
        <img src="logo.png" class="logo" alt="LANC Logo">
        
        <h1>You've been invited!</h1>
        <p class="subtitle">Join the Lancasters SMP Community</p>
        
        <div class="timer-container">
            <p class="timer-text">Redirecting you in <span id="countdown">5</span> seconds...</p>
        </div>
        
        <a href="https://discord.gg" class="btn">Accept Invite</a>

        <p class="footer">If you are not redirected, click the button above.</p>
    </div>

    <script>
        // Visual countdown script
        let timeLeft = 5;
        const countdownElement = document.getElementById('countdown');

        const timer = setInterval(() => {
            timeLeft--;
            countdownElement.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
            }
        }, 1000);
    </script>

</body>
</html>
