<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Automatic redirect after 5 seconds -->
    <meta http-equiv="refresh" content="5; url=https://discord.gg/invite/wwgS3fBHNR">
    <title>Lancasters SMP | Remote Login</title>
    
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Uses background.png from your repository */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('background.png');
            background-size: cover;
            background-position: center;
            color: white;
            overflow: hidden;
        }

        .login-card {
            background: rgba(30, 30, 35, 0.9);
            padding: 40px;
            border-radius: 8px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            width: 70px;
            margin-bottom: 20px;
        }

        h2 {
            font-weight: 400;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .status-text {
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        /* The Instant Redirect Button */
        .btn {
            background-color: #82b541; /* Minecraft green */
            color: white;
            padding: 14px;
            border: none;
            border-radius: 4px;
            width: 100%;
            text-decoration: none;
            display: block;
            font-weight: bold;
            font-size: 1em;
            transition: 0.2s;
            box-sizing: border-box;
        }

        .btn:hover {
            background-color: #92cc49;
            cursor: pointer;
            transform: translateY(-1px);
        }

        .footer-links {
            margin-top: 25px;
            font-size: 0.8em;
            color: #777;
        }

        #timer {
            font-weight: bold;
            color: #82b541;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <!-- Uses logo.png from your repository -->
        <img src="logo.png" class="logo" alt="Logo">
        
        <h2>Remote Login</h2>
        
        <p class="status-text">Establishing secure connection...</p>
        
        <!-- Manual Instant Redirect Button -->
        <a href="https://discord.gg/invite/wwgS3fBHNR" class="btn">Login Now</a>

        <div class="footer-links">
            <p>Automatic redirect in <span id="count">5</span> seconds...</p>
        </div>
    </div>

    <script>
        // Simple visual countdown script
        var seconds = 5;
        function countdown() {
            seconds--;
            document.getElementById("count").textContent = seconds;
            if (seconds > 0) {
                setTimeout(countdown, 1000);
            }
        }
        setTimeout(countdown, 1000);
    </script>

</body>
</html>
